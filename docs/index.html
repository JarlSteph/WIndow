<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Window — March 22, 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 2.5rem 3rem;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff;
      pointer-events: none;
    }
    .date {
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }
    .theme {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .meta {
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      font-weight: 400;
      opacity: 0.45;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <video src="latest.mp4" autoplay muted loop playsinline></video>
  <div class="overlay">
    <p class="date">March 22, 2026</p>
    <p class="theme">Amazon River Aerial</p>
    <p class="meta">effects: cinematic, grain &nbsp;&bull;&nbsp; loop: pingpong</p>
  </div>
</body>
</html>
